<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aether — Weather</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Syne:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ════════════════════════════════════════
   RESET & ROOT
════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --g1: #0a1628; --g2: #0d2040; --g3: #112244;
  --accent: #a8d8ea; --accent2: #ffd6a5; --accent3: #b8e4c9;
  --glass: rgba(255,255,255,0.07);
  --glass-b: rgba(255,255,255,0.13);
  --glass-hover: rgba(255,255,255,0.11);
  --shadow: 0 8px 48px rgba(0,0,0,0.4);
  --blur: blur(28px);
  --blur-sm: blur(14px);
  --radius: 24px;
  --radius-sm: 16px;
  --text-1: rgba(255,255,255,0.96);
  --text-2: rgba(255,255,255,0.62);
  --text-3: rgba(255,255,255,0.38);
  --transition-theme: 2.8s cubic-bezier(0.4,0,0.2,1);
}

html { font-size: 16px; scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', sans-serif;
  color: var(--text-1);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* ════════════════════════════════════════
   BACKGROUND SYSTEM
════════════════════════════════════════ */
#bg-canvas {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  z-index: 0;
  transition: opacity 1s ease;
}

.bg-overlay {
  position: fixed; inset: 0; z-index: 1;
  pointer-events: none;
  opacity: 0;
  transition: opacity var(--transition-theme);
}

.noise-layer {
  position: fixed; inset: 0; z-index: 2;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; opacity: 0.4;
}

/* Rain layer */
#rain-layer {
  position: fixed; inset: 0; z-index: 3;
  pointer-events: none;
  opacity: 0;
  transition: opacity 2s ease;
}

/* Snow layer */
#snow-layer {
  position: fixed; inset: 0; z-index: 3;
  pointer-events: none;
  opacity: 0;
  transition: opacity 2s ease;
}

/* Lightning layer */
#lightning-layer {
  position: fixed; inset: 0; z-index: 3;
  pointer-events: none;
  opacity: 0;
  background: rgba(200,210,255,0.04);
  transition: opacity 0.08s ease;
}

/* Fog layer */
#fog-layer {
  position: fixed; inset: 0; z-index: 3;
  pointer-events: none;
  opacity: 0;
  transition: opacity 2s ease;
}

/* Stars layer */
#stars-layer {
  position: fixed; inset: 0; z-index: 3;
  pointer-events: none;
  opacity: 0;
  transition: opacity 3s ease;
}

/* ════════════════════════════════════════
   MAIN LAYOUT
════════════════════════════════════════ */
.app-wrapper {
  position: relative; z-index: 10;
  min-height: 100vh;
  padding: 0 0 4rem;
}

/* ── HEADER ── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.5rem 2rem;
  position: sticky; top: 0; z-index: 100;
}

.header-glass {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,0.25) 0%, transparent 100%);
  backdrop-filter: blur(0px);
  pointer-events: none;
}

.logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.7rem;
  font-weight: 300;
  font-style: italic;
  color: var(--text-1);
  text-decoration: none;
  letter-spacing: 0.02em;
  position: relative; z-index: 1;
}

.header-actions {
  display: flex; align-items: center; gap: 0.75rem;
  position: relative; z-index: 1;
}

.icon-btn {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: var(--glass);
  border: 1px solid var(--glass-b);
  backdrop-filter: var(--blur-sm);
  -webkit-backdrop-filter: var(--blur-sm);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.3s ease;
  color: var(--text-2);
}
.icon-btn:hover { background: var(--glass-hover); color: var(--text-1); transform: scale(1.05); }
.icon-btn svg { width: 18px; height: 18px; }

/* ── SEARCH ── */
.search-container {
  padding: 0 2rem;
  max-width: 720px;
  margin: 0 auto 2.5rem;
}

.search-box {
  display: flex; align-items: center; gap: 0;
  background: var(--glass);
  border: 1px solid var(--glass-b);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border-radius: 100px;
  padding: 0.2rem 0.2rem 0.2rem 1.4rem;
  box-shadow: 0 4px 30px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.1);
  transition: all 0.35s ease;
}
.search-box:focus-within {
  border-color: rgba(168,216,234,0.45);
  box-shadow: 0 0 0 1px rgba(168,216,234,0.25), 0 8px 40px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.12);
}

.search-icon { color: var(--text-3); flex-shrink: 0; }
.search-icon svg { width: 18px; height: 18px; display: block; }

.search-input {
  flex: 1;
  background: none; border: none; outline: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem;
  color: var(--text-1);
  padding: 0.85rem 0.75rem;
  width: 100%;
}
.search-input::placeholder { color: var(--text-3); }

.search-btn {
  background: linear-gradient(135deg, rgba(168,216,234,0.25), rgba(168,216,234,0.12));
  border: 1px solid rgba(168,216,234,0.35);
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 0.7rem 1.5rem;
  border-radius: 100px;
  cursor: pointer;
  transition: all 0.3s ease;
  white-space: nowrap;
  flex-shrink: 0;
}
.search-btn:hover { background: linear-gradient(135deg, rgba(168,216,234,0.38), rgba(168,216,234,0.2)); transform: scale(1.03); }

/* ── CONTENT GRID ── */
.content {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 1.5rem;
  display: none;
}
.content.visible { display: block; animation: contentReveal 0.9s cubic-bezier(0.22,1,0.36,1) forwards; }
@keyframes contentReveal { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

/* ── HERO WEATHER CARD ── */
.hero-card {
  background: var(--glass);
  border: 1px solid var(--glass-b);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border-radius: var(--radius);
  padding: 2.5rem 3rem;
  margin-bottom: 1.25rem;
  box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.1);
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 1.5rem;
  align-items: center;
  position: relative;
  overflow: hidden;
}

.hero-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.25) 50%, transparent 100%);
}

.location-row {
  display: flex; align-items: center; gap: 0.5rem;
  margin-bottom: 0.4rem;
}
.location-pin { font-size: 0.85rem; opacity: 0.5; }
.location-name {
  font-family: 'DM Sans', sans-serif;
  font-size: 1rem;
  font-weight: 400;
  color: var(--text-2);
  letter-spacing: 0.03em;
}
.location-time {
  font-size: 0.8rem;
  color: var(--text-3);
  margin-left: auto;
}

.temp-display {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(5rem, 12vw, 8.5rem);
  font-weight: 300;
  line-height: 0.9;
  letter-spacing: -0.03em;
  background: linear-gradient(160deg, #ffffff 40%, rgba(200,230,255,0.8) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  transition: color 1s ease;
}
.temp-unit {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.38em;
  font-weight: 300;
  vertical-align: super;
  -webkit-text-fill-color: rgba(255,255,255,0.5);
}

.condition-row {
  display: flex; align-items: center; gap: 0.6rem;
  margin-top: 0.5rem;
}
.condition-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.45rem;
  font-weight: 400;
  font-style: italic;
  color: var(--text-2);
}

.hi-lo {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  color: var(--text-3);
  margin-top: 0.4rem;
  letter-spacing: 0.03em;
}
.hi-lo span { color: var(--text-2); }

/* Icon side */
.weather-icon-wrap {
  display: flex; flex-direction: column; align-items: center; gap: 0.75rem;
}

.weather-icon-big {
  font-size: clamp(4.5rem, 10vw, 7rem);
  line-height: 1;
  filter: drop-shadow(0 0 30px rgba(168,216,234,0.3));
  animation: iconFloat 4s ease-in-out infinite;
  display: block;
  text-align: center;
}
@keyframes iconFloat {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-8px) scale(1.03); }
}

.feels-like {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem;
  color: var(--text-3);
  text-align: center;
  letter-spacing: 0.03em;
}
.feels-like strong { color: var(--text-2); font-weight: 400; }

/* ── DETAILS GRID ── */
.details-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1rem;
  margin-bottom: 1.25rem;
}

.detail-card {
  background: var(--glass);
  border: 1px solid var(--glass-b);
  backdrop-filter: var(--blur-sm);
  -webkit-backdrop-filter: var(--blur-sm);
  border-radius: var(--radius-sm);
  padding: 1.25rem 1.4rem;
  box-shadow: 0 4px 24px rgba(0,0,0,0.2);
  transition: all 0.35s ease;
  position: relative;
  overflow: hidden;
}
.detail-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
}
.detail-card:hover { background: var(--glass-hover); transform: translateY(-2px); }

.detail-icon { font-size: 1.25rem; margin-bottom: 0.5rem; opacity: 0.75; }
.detail-label {
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 0.25rem;
}
.detail-value {
  font-family: 'Syne', sans-serif;
  font-size: 1.35rem;
  font-weight: 500;
  color: var(--text-1);
  line-height: 1.2;
}
.detail-sub {
  font-size: 0.72rem;
  color: var(--text-3);
  margin-top: 0.15rem;
}

/* ── TWO COLUMN MIDDLE ── */
.mid-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.25rem;
  margin-bottom: 1.25rem;
}

/* ── SUN CARD ── */
.sun-card {
  background: var(--glass);
  border: 1px solid var(--glass-b);
  backdrop-filter: var(--blur-sm);
  -webkit-backdrop-filter: var(--blur-sm);
  border-radius: var(--radius-sm);
  padding: 1.5rem 1.6rem;
  box-shadow: 0 4px 24px rgba(0,0,0,0.2);
  position: relative; overflow: hidden;
}
.sun-card::before {
  content: ''; position: absolute; top:0; left:0; right:0; height:1px;
  background: linear-gradient(90deg, transparent, rgba(255,200,100,0.25), transparent);
}

.card-title {
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 1.2rem;
}

.sun-arc-wrap {
  position: relative;
  height: 80px;
  margin-bottom: 1rem;
}

.sun-arc-svg { width: 100%; height: 80px; }

.sun-times {
  display: flex; justify-content: space-between;
  align-items: center;
}
.sun-time-item { text-align: center; }
.sun-time-label { font-size: 0.7rem; color: var(--text-3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.2rem; }
.sun-time-value { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 500; color: var(--text-1); }

/* ── AQI CARD ── */
.aqi-card {
  background: var(--glass);
  border: 1px solid var(--glass-b);
  backdrop-filter: var(--blur-sm);
  -webkit-backdrop-filter: var(--blur-sm);
  border-radius: var(--radius-sm);
  padding: 1.5rem 1.6rem;
  box-shadow: 0 4px 24px rgba(0,0,0,0.2);
  position: relative; overflow: hidden;
}
.aqi-card::before {
  content: ''; position: absolute; top:0; left:0; right:0; height:1px;
  background: linear-gradient(90deg, transparent, rgba(120,220,160,0.25), transparent);
}

.aqi-number {
  font-family: 'Cormorant Garamond', serif;
  font-size: 3.5rem;
  font-weight: 300;
  line-height: 1;
  margin-bottom: 0.2rem;
}
.aqi-label { font-size: 0.85rem; color: var(--text-2); margin-bottom: 1rem; }

.aqi-bar-track {
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 100px;
  overflow: hidden;
  margin-bottom: 0.6rem;
}
.aqi-bar-fill {
  height: 100%;
  border-radius: 100px;
  transition: width 1.2s cubic-bezier(0.22,1,0.36,1);
}

.aqi-scale {
  display: flex; justify-content: space-between;
  font-size: 0.65rem; color: var(--text-3); letter-spacing: 0.05em;
}

/* ── HOURLY FORECAST ── */
.hourly-card {
  background: var(--glass);
  border: 1px solid var(--glass-b);
  backdrop-filter: var(--blur-sm);
  -webkit-backdrop-filter: var(--blur-sm);
  border-radius: var(--radius-sm);
  padding: 1.5rem 1.6rem;
  margin-bottom: 1.25rem;
  box-shadow: 0 4px 24px rgba(0,0,0,0.2);
  position: relative; overflow: hidden;
}
.hourly-card::before {
  content: ''; position: absolute; top:0; left:0; right:0; height:1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
}

.hourly-scroll {
  display: flex;
  gap: 0.75rem;
  overflow-x: auto;
  padding-bottom: 0.5rem;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.hourly-scroll::-webkit-scrollbar { display: none; }

.hour-item {
  display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 0.9rem 0.9rem;
  min-width: 68px;
  cursor: default;
  transition: all 0.3s ease;
  flex-shrink: 0;
}
.hour-item:hover { background: rgba(255,255,255,0.09); transform: translateY(-2px); }
.hour-item.now { border-color: rgba(168,216,234,0.4); background: rgba(168,216,234,0.1); }

.hour-time { font-size: 0.7rem; color: var(--text-3); letter-spacing: 0.05em; }
.hour-icon { font-size: 1.4rem; }
.hour-temp { font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 500; }
.hour-pop { font-size: 0.65rem; color: #7eb8d4; }

/* ── DAILY FORECAST ── */
.daily-card {
  background: var(--glass);
  border: 1px solid var(--glass-b);
  backdrop-filter: var(--blur-sm);
  -webkit-backdrop-filter: var(--blur-sm);
  border-radius: var(--radius-sm);
  padding: 1.5rem 1.6rem;
  margin-bottom: 1.25rem;
  box-shadow: 0 4px 24px rgba(0,0,0,0.2);
  position: relative; overflow: hidden;
}
.daily-card::before {
  content: ''; position: absolute; top:0; left:0; right:0; height:1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
}

.day-row {
  display: flex; align-items: center; gap: 1rem;
  padding: 0.75rem 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  transition: background 0.3s ease;
}
.day-row:last-child { border-bottom: none; padding-bottom: 0; }
.day-row:first-child { padding-top: 0; }
.day-row:hover { background: rgba(255,255,255,0.03); border-radius: 10px; padding-left: 0.5rem; padding-right: 0.5rem; }

.day-name { font-size: 0.9rem; color: var(--text-2); width: 60px; flex-shrink: 0; }
.day-name.today { color: var(--accent); font-weight: 500; }
.day-icon { font-size: 1.4rem; flex-shrink: 0; }
.day-desc { font-size: 0.8rem; color: var(--text-3); flex: 1; }
.day-pop { font-size: 0.78rem; color: #7eb8d4; width: 40px; text-align: right; flex-shrink: 0; }
.day-temps { display: flex; align-items: center; gap: 0.6rem; font-family: 'Syne', sans-serif; font-size: 0.95rem; flex-shrink: 0; }
.day-hi { color: var(--text-1); font-weight: 500; }
.day-lo { color: var(--text-3); }
.day-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.08); border-radius: 100px; position: relative; overflow: hidden; }
.day-bar-fill { height: 100%; border-radius: 100px; background: linear-gradient(90deg, #7eb8d4, #ffd6a5); }

/* ── LOADING STATE ── */
.loading-state {
  display: none;
  flex-direction: column; align-items: center; justify-content: center;
  min-height: 50vh; gap: 1.5rem;
  text-align: center; padding: 3rem;
}
.loading-state.visible { display: flex; }

.loading-icon { font-size: 3rem; animation: spin 2s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.loading-text { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-style: italic; color: var(--text-2); }
.loading-sub { font-size: 0.85rem; color: var(--text-3); }

/* ── ERROR STATE ── */
.error-state {
  display: none;
  flex-direction: column; align-items: center; justify-content: center;
  min-height: 40vh; gap: 1rem;
  text-align: center; padding: 3rem;
}
.error-state.visible { display: flex; }
.error-icon { font-size: 2.5rem; }
.error-title { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-style: italic; color: var(--text-2); }
.error-text { font-size: 0.9rem; color: var(--text-3); max-width: 320px; line-height: 1.6; }
.retry-btn {
  margin-top: 0.5rem;
  background: var(--glass);
  border: 1px solid var(--glass-b);
  color: var(--text-1);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  padding: 0.7rem 1.8rem;
  border-radius: 100px;
  cursor: pointer;
  transition: all 0.3s ease;
  backdrop-filter: var(--blur-sm);
}
.retry-btn:hover { background: var(--glass-hover); transform: scale(1.03); }

/* ── WELCOME STATE ── */
.welcome-state {
  display: flex;
  flex-direction: column; align-items: center; justify-content: center;
  min-height: 55vh; gap: 1.2rem;
  text-align: center; padding: 3rem;
}

.welcome-icon { font-size: 3.5rem; animation: iconFloat 4s ease-in-out infinite; }
.welcome-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.8rem, 5vw, 2.4rem); font-style: italic; color: var(--text-2); }
.welcome-hint { font-size: 0.9rem; color: var(--text-3); max-width: 320px; line-height: 1.65; }

.geo-btn {
  display: inline-flex; align-items: center; gap: 0.6rem;
  background: rgba(168,216,234,0.1);
  border: 1px solid rgba(168,216,234,0.3);
  color: var(--accent);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  padding: 0.75rem 1.6rem;
  border-radius: 100px;
  cursor: pointer;
  transition: all 0.35s ease;
  backdrop-filter: var(--blur-sm);
}
.geo-btn:hover { background: rgba(168,216,234,0.18); transform: scale(1.03); box-shadow: 0 0 20px rgba(168,216,234,0.15); }
.geo-btn svg { width: 16px; height: 16px; }

/* ── UNIT TOGGLE ── */
.unit-toggle {
  display: flex; gap: 0;
  background: var(--glass);
  border: 1px solid var(--glass-b);
  border-radius: 100px;
  padding: 3px;
  backdrop-filter: var(--blur-sm);
}
.unit-btn {
  background: none; border: none;
  color: var(--text-3);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem;
  font-weight: 500;
  padding: 0.3rem 0.75rem;
  border-radius: 100px;
  cursor: pointer;
  transition: all 0.3s ease;
}
.unit-btn.active { background: rgba(255,255,255,0.15); color: var(--text-1); }

/* ── BACK LINK ── */
.back-link {
  display: inline-flex; align-items: center; gap: 0.4rem;
  color: var(--text-3);
  font-size: 0.8rem;
  font-family: 'DM Sans', sans-serif;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  text-decoration: none;
  transition: color 0.3s ease;
}
.back-link:hover { color: var(--text-2); }
.back-link svg { width: 14px; height: 14px; }

/* ════════════════════════════════════════
   RESPONSIVE
════════════════════════════════════════ */
@media (max-width: 900px) {
  .details-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 680px) {
  .header { padding: 1.2rem 1.2rem; }
  .search-container { padding: 0 1.2rem; }
  .content { padding: 0 1rem; }
  .hero-card { padding: 1.8rem 1.6rem; grid-template-columns: 1fr; }
  .weather-icon-wrap { flex-direction: row; justify-content: flex-start; }
  .details-grid { grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
  .mid-grid { grid-template-columns: 1fr; }
  .temp-display { font-size: 5.5rem; }
}
@media (max-width: 420px) {
  .details-grid { grid-template-columns: repeat(2, 1fr); }
